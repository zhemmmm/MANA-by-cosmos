services:
  # ── Flask Backend ─────────────────────────────────────────────────────────────
  - type: web
    name: mana-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --timeout 120
    plan: free
    envVars:
      - key: JWT_SECRET_KEY
        generateValue: true          # Render auto-generates a secure random value
      - key: DATABASE_URL
        sync: false                  # Set manually in Render dashboard (your Supabase URL)
      - key: CORS_ORIGINS
        sync: false                  # e.g. https://mana-frontend.onrender.com
      - key: APIFY_TOKEN
        sync: false
      - key: APIFY_FB_ACTOR_TASK_ID
        sync: false
      - key: APIFY_WEBHOOK_SECRET
        sync: false

# NOTE: The frontend (static site) cannot be declared in render.yaml.
# Create it manually: Render dashboard → New → Static Site → connect the same repo,
# set Root Directory to "frontend", Publish Directory to "." and leave Build Command empty.
